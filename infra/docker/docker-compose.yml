services:
  postgres:
    build:
      context: ../..
      dockerfile: infra/docker/postgres/Dockerfile
    image: porprov/postgres:15-postgis
    container_name: porprov_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-porprov_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-porprov_secret}
      POSTGRES_DB: ${POSTGRES_DB:-porprov_db}
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - porprov_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-porprov_admin} -d ${POSTGRES_DB:-porprov_db}"]
      interval: 5s
      timeout: 5s
      retries: 12

  migrate-master-data:
    build:
      context: ../..
      dockerfile: services/master-data-service/Dockerfile.migrations
    command: ["-path", "/migrations", "-database", "postgres://${POSTGRES_USER:-porprov_admin}:${POSTGRES_PASSWORD:-porprov_secret}@postgres:5432/master_data_db?sslmode=disable", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - porprov_network
    restart: "no"

  migrate-schedule:
    build:
      context: ../..
      dockerfile: services/schedule-service/Dockerfile.migrations
    command: ["-path", "/migrations", "-database", "postgres://${POSTGRES_USER:-porprov_admin}:${POSTGRES_PASSWORD:-porprov_secret}@postgres:5432/schedule_db?sslmode=disable", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - porprov_network
    restart: "no"

  migrate-venue:
    build:
      context: ../..
      dockerfile: services/venue-service/Dockerfile.migrations
    command: ["-path", "/migrations", "-database", "postgres://${POSTGRES_USER:-porprov_admin}:${POSTGRES_PASSWORD:-porprov_secret}@postgres:5432/venue_db?sslmode=disable", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - porprov_network
    restart: "no"

  master-data-service:
    build:
      context: ../..
      dockerfile: services/master-data-service/Dockerfile
    container_name: porprov_master_data
    restart: always
    environment:
      PORT: "8081"
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgres://${POSTGRES_USER:-porprov_admin}:${POSTGRES_PASSWORD:-porprov_secret}@postgres:5432/master_data_db?sslmode=disable
      SCHEDULE_SERVICE_URL: http://schedule-service:8082/api/v1
      NATS_URL: nats://nats:4222
    ports:
      - "${MASTER_DATA_HOST_PORT:-18081}:8081"
    volumes:
      - master_data_uploads:/app/uploads
    depends_on:
      migrate-master-data:
        condition: service_completed_successfully
      nats:
        condition: service_started
    networks:
      - porprov_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  venue-service:
    build:
      context: ../..
      dockerfile: services/venue-service/Dockerfile
    container_name: porprov_venue
    restart: always
    environment:
      PORT: "8087"
      DATABASE_URL: postgres://${POSTGRES_USER:-porprov_admin}:${POSTGRES_PASSWORD:-porprov_secret}@postgres:5432/venue_db?sslmode=disable
      SCHEDULE_SERVICE_URL: http://schedule-service:8082/api/v1
      NATS_URL: nats://nats:4222
    ports:
      - "${VENUE_HOST_PORT:-18087}:8087"
    depends_on:
      migrate-venue:
        condition: service_completed_successfully
      nats:
        condition: service_started
    networks:
      - porprov_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8087/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  schedule-service:
    build:
      context: ../..
      dockerfile: services/schedule-service/Dockerfile
    container_name: porprov_schedule
    restart: always
    environment:
      PORT: "8082"
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgres://${POSTGRES_USER:-porprov_admin}:${POSTGRES_PASSWORD:-porprov_secret}@postgres:5432/schedule_db?sslmode=disable
      MASTER_DATA_SERVICE_URL: http://master-data-service:8081/api/v1
      VENUE_SERVICE_URL: http://venue-service:8087/api/v1/venues
      NATS_URL: nats://nats:4222
    ports:
      - "${SCHEDULE_HOST_PORT:-18082}:8082"
    depends_on:
      migrate-schedule:
        condition: service_completed_successfully
      master-data-service:
        condition: service_healthy
      venue-service:
        condition: service_healthy
    networks:
      - porprov_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  api-gateway:
    build:
      context: ../..
      dockerfile: services/api-gateway/Dockerfile
    container_name: porprov_api_gateway
    restart: always
    environment:
      PORT: "8000"
      APP_ENV: ${APP_ENV:-development}
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/porprov/protocol/openid-connect/certs
      MASTER_DATA_SERVICE_URL: http://master-data-service:8081/api/v1
      SCHEDULE_SERVICE_URL: http://schedule-service:8082/api/v1
      VENUE_SERVICE_URL: http://venue-service:8087/api/v1/venues
    ports:
      - "${API_GATEWAY_HOST_PORT:-8000}:8000"
    depends_on:
      keycloak:
        condition: service_started
      master-data-service:
        condition: service_healthy
      schedule-service:
        condition: service_healthy
      venue-service:
        condition: service_healthy
    networks:
      - porprov_network

  admin-web:
    build:
      context: ../..
      dockerfile: apps/admin-web-react/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
        VITE_OIDC_AUTHORITY: ${VITE_OIDC_AUTHORITY:-http://localhost:8080/realms/porprov}
        VITE_OIDC_CLIENT_ID: ${VITE_OIDC_CLIENT_ID:-porprov-admin-web}
    container_name: porprov_admin_web
    restart: always
    ports:
      - "${ADMIN_WEB_HOST_PORT:-5173}:80"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - porprov_network

  redis:
    image: redis:7-alpine
    container_name: porprov_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-porprov_redis_secret}
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - porprov_network

  nats:
    image: nats:2.10-alpine
    container_name: porprov_nats
    restart: always
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "${NATS_CLIENT_HOST_PORT:-14222}:4222" # Client port
      - "${NATS_MONITOR_HOST_PORT:-18222}:8222" # Management port
    volumes:
      - nats_data:/data
    networks:
      - porprov_network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: porprov_keycloak
    restart: always
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-porprov_db}
      KC_DB_USERNAME: ${POSTGRES_USER:-porprov_admin}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-porprov_secret}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_secret}
      KC_HEALTH_ENABLED: 'true'
      KC_METRICS_ENABLED: 'true'
    command: start-dev
    ports:
      - "${KEYCLOAK_HOST_PORT:-8080}:8080"
    depends_on:
      - postgres
    networks:
      - porprov_network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: porprov_nginx
    restart: always
    ports:
      - "${HTTP_HOST_PORT:-80}:80"
      - "${HTTPS_HOST_PORT:-443}:443"
    depends_on:
      - keycloak
    networks:
      - porprov_network

  prometheus:
    build:
      context: ../..
      dockerfile: infra/docker/prometheus/Dockerfile
    image: porprov/prometheus:v2.45.0
    container_name: porprov_prometheus
    restart: always
    ports:
      - "${PROMETHEUS_HOST_PORT:-19090}:9090"
    volumes:
      - prometheus_data:/prometheus
    networks:
      - porprov_network

  grafana:
    image: grafana/grafana-oss:10.0.3
    container_name: porprov_grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "${GRAFANA_HOST_PORT:-13000}:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - porprov_network

volumes:
  postgres_data:
  redis_data:
  nats_data:
  prometheus_data:
  grafana_data:
  master_data_uploads:

networks:
  porprov_network:
    driver: bridge
